<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>小确幸记录仪 - 记录瞬间</title>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .joy-halo-focus:focus-within {
            box-shadow: 0 0 20px 2px rgba(255, 140, 66, 0.15);
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar Shell (Suppressed navigation items for focused task) -->
<header class="fixed top-0 w-full z-50 bg-[#fefccf]/70 dark:bg-stone-900/70 backdrop-blur-xl shadow-sm shadow-[#1d1d03]/5 flex justify-between items-center px-6 h-16">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Soft illustrated avatar of a smiling user" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBDuQ62twIes-Zi9E1e9SEtvendB3BfREKdAQ_0Q-rhsUVGOtPyMoWoFqV1HX7TfwP5vL3eV5YPUk2l90fHxBRaWluMvLhe3nW3Kfu-SdFLFhEWIDRv8Bt8oiXSFW8IU31tu-xx8LQG-fg5HJuPi9VJSka1U_x_rn00DEOxocank_n3MrDKgRSdMOq5wnktckndmN-o546oLBy6O9uF2ZqOuDbwBNQEC5E-79c1YgSj130HaYTuhPcRR9uZ8Kb5u7sN4x-_us3c1wg"/>
</div>
<h1 class="text-[#9b4500] dark:text-[#ff8c42] font-headline tracking-wide font-bold text-lg">Little Joy Tracker</h1>
</div>
<button class="flex items-center gap-1 bg-surface-container-low px-3 py-1.5 rounded-full text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="text-xs font-medium font-label">记录给：[男朋友]</span>
<span class="material-symbols-outlined text-sm leading-none">arrow_drop_down</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 pt-20 pb-48 px-6 flex flex-col">
<div class="flex-1 bg-surface-container-lowest shadow-sm overflow-hidden flex flex-col joy-halo-focus transition-all duration-300 rounded-2xl">
<!-- Image Upload Area -->
<div class="w-full aspect-square bg-surface-container-low rounded-2xl relative flex flex-col items-center justify-center group cursor-pointer border-b border-transparent overflow-hidden">
<div class="w-16 h-16 rounded-full bg-surface-container-lowest shadow-sm flex items-center justify-center text-primary group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-3xl">photo_camera</span>
</div>
<p class="mt-4 text-on-surface-variant font-label text-sm opacity-60">添加照片或视频</p>
</div>
<!-- Text Entry Areas -->
<div class="p-8 space-y-8 flex-1">
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-widest text-primary font-bold opacity-50">那个瞬间</label>
<textarea class="w-full bg-transparent border-none focus:ring-0 p-0 text-2xl font-headline font-bold text-on-surface placeholder:text-on-surface-variant/30 resize-none min-h-[80px]" placeholder="发生了什么？"></textarea>
</div>
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-widest text-tertiary font-bold opacity-50">此时感悟</label>
<textarea class="w-full bg-transparent border-none focus:ring-0 p-0 text-lg font-body text-on-surface-variant placeholder:text-on-surface-variant/20 resize-none min-h-[120px]" placeholder="为什么觉得美好？"></textarea>
</div>
</div>
</div>
</main>
<!-- Task Action Bar (Placed above BottomNavBar) -->
<div class="fixed bottom-24 left-0 w-full bg-white/80 dark:bg-stone-900/80 backdrop-blur-2xl shadow-[0_-4px_20px_0_rgba(29,29,3,0.06)] h-20 flex items-center justify-between px-8 z-40">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-[#9b4500] transition-colors active:scale-95 transition-transform">
<span class="material-symbols-outlined text-xl">calendar_today</span>
<span class="font-label font-medium text-sm">今天</span>
</button>
<div class="flex items-center gap-4">
<button class="px-6 py-3 text-on-surface-variant font-label font-semibold text-sm hover:opacity-70 active:scale-95 transition-all">
                取消
            </button>
<button class="bg-primary-container text-white px-8 py-3 rounded-full font-headline font-bold shadow-lg shadow-[#ff8c42]/20 hover:opacity-90 active:scale-95 transition-all flex items-center gap-2"><span class="material-symbols-outlined text-xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span> 确认发布</button>
</div>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full bg-white/80 dark:bg-stone-900/80 backdrop-blur-2xl shadow-[0_-4px_20px_0_rgba(29,29,3,0.06)] rounded-t-[3rem] z-50 flex justify-around items-end pb-6 px-8 h-24">
<a class="flex flex-col items-center justify-center bg-[#ff8c42] text-white rounded-full p-3 mb-2 shadow-lg shadow-[#ff8c42]/20 active:scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined">add_circle</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-widest mt-1">记录</span>
</a>
<a class="flex flex-col items-center justify-center text-[#564338] dark:text-stone-400 p-2 hover:text-[#9b4500] dark:hover:text-[#ff8c42] active:scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined">auto_stories</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-widest">时间轴</span>
</a>
<a class="flex flex-col items-center justify-center text-[#564338] dark:text-stone-400 p-2 hover:text-[#9b4500] dark:hover:text-[#ff8c42] active:scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined">insights</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-widest">洞察</span>
</a>
<a class="flex flex-col items-center justify-center text-[#564338] dark:text-stone-400 p-2 hover:text-[#9b4500] dark:hover:text-[#ff8c42] active:scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-widest">设置</span>
</a>
</nav>
</body></html>
