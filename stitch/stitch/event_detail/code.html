<!-- What Happened -->

<h2 class="font-headline text-sm font-bold tracking-[0.2em] uppercase text-on-surface-variant/50 mb-4">发生了什么</h2>
<p class="text-xl leading-[1.8] text-on-surface font-light">今天，当这座城市还在半梦半醒之间时，我注意到阳台的花盆里冒出了第一颗小小的绿芽。在清晨微凉的空气中，它看起来如此脆弱，却又无比坚定。我就在那儿坐了十分钟，静静观察着晨光如何在它表面的露珠上闪烁。</p>
</section>

<div class="absolute -left-4 top-0 bottom-0 w-[2px] bg-tertiary-container/30"></div>
<h2 class="font-headline text-sm font-bold tracking-[0.2em] uppercase text-tertiary/60 mb-4">为什么觉得美好</h2>
<p class="text-xl leading-[1.8] text-on-surface-variant italic font-serif">“它提醒我，成长并不需要等待完美的条件；只要能找到光，它就会努力向光而行。那一刻，四周有一种深沉的宁静，让整个世界显得更小、更温柔，也充满了静谧的潜能。”</p>
</section>
